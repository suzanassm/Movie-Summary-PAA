<!DOCTYPE html>
<html>
    <head>
        <title>Movie Summary</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">    
    </head>
    <body>
        <div class="container">

            <div id="cabecalho">
                <h1>Movie Summary</h1>
            </div>

            <div id="pesquisa">
                <select name="metodos" id="metodos">
                    <option value="w2v">Word2Vec Average</option>
                    <option value="hnsw">HNSW Search</option>
                    <option value="tfidf">TF-IDF</option>
                </select>

                <input
                    type="text"
                    id="query"
                    placeholder="Pesquise um filme..."
                >

                <button onclick="buscar()">Search</button>
            </div>

            <div id="carregamento" style="display:none">
                <div class="animacao"></div>
                Pesquisando...
            </div>

            <div id="resultado"></div>

        </div>

        <script src="{{ url_for('static', filename='script.js') }}"></script>
    </body>
</html>
